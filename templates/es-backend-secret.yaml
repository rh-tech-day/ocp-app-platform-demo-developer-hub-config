apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: rhdh
  labels:
    app.kubernetes.io/name: backstage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: backend-secret
    creationPolicy: Owner
  data:
    - secretKey: BACKEND_SECRET
      remoteRef:
        key: secrets/rhdh/backend-secret
        property: value
    - secretKey: MCP_SECRET
      remoteRef:
        key: secrets/rhdh/mcp-secret
        property: value